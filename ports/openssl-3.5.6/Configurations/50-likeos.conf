## OpenSSL configuration target for LikeOS-64
##
## Based on the linux-x86_64 target but adapted for the LikeOS userland:
##   - No AF_ALG kernel crypto socket (no-afalgeng)
##   - No kernel TLS offload (no-ktls)
##   - No pinshared (-Wl,-znodelete causes issues with our dynamic linker)
##   - Entropy via /dev/urandom (present in devfs) and RDRAND instruction
##   - pthreads threading, dlfcn DSO
##   - dlopen/dlsym/pthreads provided by libc.so (no separate -ldl/-lpthread)

my %targets = (
    "likeos-common" => {
        template         => 1,
        CC               => "gcc",
        CXX              => "g++",
        AR               => "ar",
        ARFLAGS          => "qc",
        RANLIB           => "ranlib",
        CFLAGS           => picker(default => "-Wall",
                                   debug   => "-O0 -g",
                                   release => "-O2"),
        CXXFLAGS         => picker(default => "-Wall",
                                   debug   => "-O0 -g",
                                   release => "-O2"),
        cflags           => combine(
                                "-nostdlib -fno-builtin -fno-stack-protector",
                                "-mno-red-zone -fPIC",
                                "-include \$(SRCDIR)/os-dep/likeos.h",
                                threads("-pthread")),
        cxxflags         => combine("-std=c++11", threads("-pthread")),
        lib_cppflags     => "-DL_ENDIAN -DOPENSSL_USE_NODELETE -D__LIKEOS__",
        # dlopen and pthreads live in libc.so — no separate -ldl or -pthread
        ex_libs          => "",
        thread_scheme    => "pthreads",
        dso_scheme       => "dlfcn",
        shared_target    => "gnu-shared",
        # -nostdlib prevents gcc from auto-injecting host crt/libc into shared libs
        shared_cflag     => "-fPIC",
        shared_ldflag    => "-shared -nostdlib -Wl,-Bsymbolic",
        perlasm_scheme   => "elf",
        sys_id           => "LIKEOS",
        perl_platform    => "Unix",
        HASHBANGPERL     => "/usr/bin/env perl",
    },

    "likeos-x86_64" => {
        inherit_from     => [ "likeos-common" ],
        cflags           => add("-m64"),
        cxxflags         => add("-m64"),
        bn_ops           => "SIXTY_FOUR_BIT_LONG",
        asm_arch         => "x86_64",
        perlasm_scheme   => "elf",
        multilib         => "64",
    },
);
