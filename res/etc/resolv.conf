# /etc/resolv.conf — RFC 3493 / RFC 1123 §6.1 stub-resolver configuration.
#
# Each `nameserver` line specifies one IPv4 recursive resolver to try in
# order.  `search` adds default search-domains for unqualified names.
# `options` follows the BSD resolver(5) grammar.
#
# DHCP option 6 will overwrite the per-interface DNS server at runtime;
# this file is the static fallback used before DHCP completes and on
# interfaces configured manually.

nameserver 1.1.1.1
nameserver 9.9.9.9
nameserver 8.8.8.8

search localdomain
options timeout:2 attempts:2
